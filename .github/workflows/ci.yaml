name: CI
on:
  push:
    branches: [ lab4* ]
  pull_request:
    branches: [ lab4* ]

jobs:
  docker-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        continue-on-error: true
        with:
          dockerfile: Dockerfile

  tests:
    needs: docker-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt pytest-playwright fastapi uvicorn tinydb requests
          playwright install --with-deps chromium

      - name: Start TinyDB Service
        run: |
          nohup uvicorn db_service.main:app --host 127.0.0.1 --port 8282 &
          sleep 3

      - name: Start app
        run: |
          export DB_URL=http://127.0.0.1:8282
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8181 &
          sleep 5

      - name: Run tests
        
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/app
        run: pytest --junitxml=test_result.xml

  build-and-push:
    needs: tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare image name
        id: prep
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repo_lower=${REPO_LOWER}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build App Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.prep.outputs.repo_lower }}-app:latest
            ghcr.io/${{ steps.prep.outputs.repo_lower }}-app:${{ github.sha }}

      - name: Build TinyDB Service Image
        uses: docker/build-push-action@v5
        with:
          context: ./db_service
          file: ./db_service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.prep.outputs.repo_lower }}-db:latest
            ghcr.io/${{ steps.prep.outputs.repo_lower }}-db:${{ github.sha }}
