name: Deploy
on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare Image Name
        id: prep
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repo_lower=${REPO_LOWER}" >> $GITHUB_OUTPUT
      - name: Deploy via script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: course.prafdin.ru
          username: user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 3119
          script: |
              bash ~/catty-reminders-app/run_app.sh \
              ${{ github.sha }} \
              "ghcr.io/${{steps.prep.outputs.repo_lower}}:latest" \
              "${{secrets.GH_PAT}}" \
              "${{github.actor}}"
          debug: true
